  .card-footer { padding: 6px 12px 8px; border-top: 0.5px solid #d4d3ce; background: #f9f8f6; display: flex; align-items: flex-start; gap: 6px; }
  .card-footer i { font-size: 13px; color: #5f5e5a; margin-top: 1px; }
  .card-footer span { font-size: 11px; color: #5f5e5a; line-height: 1.4; }

<script>
const COLORS={1:'#5F5E5A',2:'#534AB7',3:'#185FA5',4:'#185FA5',5:'#185FA5',6:'#185FA5',7:'#BA7517',8:'#0F6E56',9:'#993C1D'};

 Flensborg, begge broer og overnatning", "teaser": "En rolig base efter første dag, tæt på Waal, broerne og Market Garden-fortællingen.", "links": [["Kort", "https://www.openstreetmap.org/?mlat=51.842&mlon=5.853#map=13/51.842/5.853"]]}, {"n": 7, "day": 2, "lat": 50.698446, "lng": 2.243514, "name": "La Coupole, Wizernes", "meta": "2,5t – V2-raketbunker · 260 km fra Nijmegen", "teaser": "En enorm bunker, hvor nazistisk våbenteknologi, tvangsarbejde og terrorbombning bindes sammen.", "links": [["Læs mere", "https://lacoupole-france.com/en/"]]}, {"n": 8, "day": 2, "lat": 49.208, "lng": -0.39, "name": "Brit Hotel Caen Nord – Mémorial", "meta": "Base i Normandiet (søndag–fredag, 5 nætter) · 280 km fra La Coupole", "teaser": "Basen ligger strategisk godt for både vestlige, centrale og østlige D-dagslokationer.", "links": [["Kort", "https://www.openstreetmap.org/?mlat=49.208&mlon=-0.390#map=15/49.208/-0.390"]]}, {"n": 9, "day": 3, "lat": 49.408249, "lng": -1.314964, "name": "Airborne Museum, St-Mère-Église", "meta": "2,5t – 80 km fra Caen", "teaser": "Et stærkt sted for luftlandsætningerne, faldskærmstropperne og de små enheders initiativ på D-dag.", "links": [["Læs mere", "https://www.airborne-museum.org/en/"]]}, {"n": 10, "day": 3, "lat": 49.384, "lng": -1.24, "name": "Easy Co. & Maj. Winters memorial", "meta": "45 min – 10 km", "teaser": "Et kort, men godt stop om ledelse, small-unit tactics og Easy Companys rolle omkring Brécourt.", "links": [["Kort", "https://www.openstreetmap.org/?mlat=49.384&mlon=-1.240#map=15/49.384/-1.240"]]}, {"n": 11, "day": 3, "lat": 49.302, "lng": -1.244, "name": "Normandy Victory Museum, Carentan", "meta": "2t – 15 km", "teaser": "Museet giver en jordnær forståelse af hedgerow-kampene og hvorfor Carentan var operationelt vigtig.", "links": [["Læs mere", "https://normandy-victory-museum.fr/en/"]]}, {"n": 12, "day": 4, "lat": 49.359, "lng": -0.855, "name": "Omaha Beach + Colleville kirkegård", "meta": "3,5t – 35 km fra Caen", "teaser": "Et af turens mest alvorlige stop: strand, terræn og kirkegård viser både taktisk modstand og menneskelige tab.", "links": [["Læs mere", "https://www.abmc.gov/Normandy"]]}, {"n": 13, "day": 5, "lat": 49.3908, "lng": -0.9867, "name": "Pointe du Hoc", "meta": "1,5t – 45 km fra Caen", "teaser": "Klipper, kratere og bunkere gør Atlantvoldens betydning fysisk tydelig på få minutter.", "links": [["Læs mere", "https://www.abmc.gov/Pointe-du-Hoc"]]}, {"n": 14, "day": 5, "lat": 49.3402, "lng": -0.620916, "name": "Musée du Débarquement, Arromanches", "meta": "2t – 30 km", "teaser": "Her bliver logistikken bag Overlord synlig gennem Mulberry-havnen og forsyningsapparatet efter landgangen.", "links": [["Læs mere", "https://musee-arromanches.fr/en/"]]}, {"n": 15, "day": 5, "lat": 49.33653, "lng": -0.46181, "name": "Centre Juno Beach, Courseulles", "meta": "2t – 25 km", "teaser": "Et vigtigt korrektiv til den klassiske fortælling: Normandiet var også canadisk og Commonwealth-historie.", "links": [["Læs mere", "https://www.junobeach.org/"]]}, {"n": 16, "day": 6, "lat": 49.2423, "lng": -0.2717, "name": "Mémorial Pegasus", "meta": "2t – 15 km fra Caen", "teaser": "Broerne ved Orne-kanalen viser, hvordan østflanken blev sikret allerede før strandlandingerne.", "links": [["Læs mere", "https://musee.memorial-pegasus.com/en/"]]}, {"n": 17, "day": 6, "lat": 49.272, "lng": -0.196, "name": "Merville Battery", "meta": "1,5t – 10 km", "teaser": "Et kompakt stop om luftbårne angreb, usikker efterretning og neutralisering af kystartilleri.", "links": [["Læs mere", "https://www.batterie-merville.com/en/"]]}, {"n": 18, "day": 6, "lat": 49.197438, "lng": -0.384135, "name": "Mémorial de Caen", "meta": "3t – eftermiddag · sidste dag i Caen", "teaser": "Museet samler krigens større linjer og giver perspektiv på hvorfor invasionen blev nødvendig.", "links": [["Læs mere", "https://www.memorial-caen.com/"]]}, {"n": 19, "day": 7, "lat": 50.00957, "lng": 5.718956, "name": "Bastogne Barracks", "meta": "2,5t – 500 km fra Caen · afgang ~08:00", "teaser": "Et centralt stop for Ardenneroffensiven, forsvarskampen om Bastogne og 101st Airborne-fortællingen.", "links": [["Læs mere", "https://bastognebarracks.be/"], ["Rute i området", "https://www.liberationroute.com/en/themed-routes/8/around-bastogne"]]}, {"n": 20, "day": 8, "lat": 51.570579, "lng": 5.956622, "name": "Overloon War Museum", "meta": "2t – 180 km fra Bastogne", "teaser": "Et stort og meget visuelt museum, hvor krigens materiel og civile konsekvenser står side om side.", "links": [["Læs mere", "https://www.oorlogsmuseum.nl/en/"]]}, {"n": 21, "day": 8, "lat": 51.9872, "lng": 5.8433, "name": "Airborne Museum Hartenstein, Arnhem", "meta": "2,5t – 60 km fra Overloon · overnatning Arnhem", "teaser": "Den tidligere britiske hovedkvartersbygning fortæller Arnhem-slaget indefra, ikke kun som bro-myte.", "links": [["Læs mere", "https://www.airbornemuseum.nl/en/"]]}, {"n": 22, "day": 9, "lat": 52.9859, "lng": 10.0898, "name": "Deutsches Panzermuseum, Munster", "meta": "2t – ca. 200 km fra Arnhem · videre mod Flensborg og Skive", "teaser": "Et oplagt fagligt stop om panser, doktrin, teknologi og hvordan kampkøretøjer formede moderne landkrig.", "links": [["Læs mere", "https://daspanzermuseum.de/"]]}, {"n": 23, "day": 9, "lat": 54.79033, "lng": 9.39093, "name": "Fleggaard Harrislee – grænsehandel", "meta": "Shopping-/pausepunkt ved Flensborg på hjemturen", "teaser": "Et oplagt sidste stop til grænsehandel og en praktisk pause, inden turen går det sidste stykke mod Skive.", "links": [["Læs mere", "https://www.fleggaard.dk/da-dk/fleggaard-harrislee"], ["Kort", "https://www.openstreetmap.org/?mlat=54.79033&mlon=9.39093#map=16/54.79033/9.39093"]]}];
const DAYS=[{"d": 1, "label": "Lørdag", "title": "Udrejse + Flensborg + begge broer", "sub": "Skive → Kolding → Fleggaard Harrislee → Nijmegen/Arnhem", "over": "Nijmegen · ca. 670 km / lang transportdag inkl. shopping og broer", "stops": [1, 2, 3, 4, 5, 6], "warn": "Grænsehandel kan holdes som kort, praktisk stop; ellers æder det hurtigt af tiden ved broerne i Holland."}, {"d": 2, "label": "Søndag", "title": "La Coupole → Caen", "sub": "Nordfrankrig og ankomst Caen", "over": "Brit Hotel Caen Nord – Mémorial · ca. 540 km / ~7,5t", "stops": [7, 8], "warn": null}, {"d": 3, "label": "Mandag", "title": "Cotentin-halvøen", "sub": "St-Mère-Église, Easy Co., Carentan", "over": "Brit Hotel Caen Nord · 155 km / ~7t", "stops": [9, 10, 11], "warn": null}, {"d": 4, "label": "Tirsdag", "title": "Omaha Beach", "sub": "Omaha Beach + Colleville amerikanske kirkegård", "over": "Brit Hotel Caen Nord · 70 km / ~5t", "stops": [12], "warn": null}, {"d": 5, "label": "Onsdag", "title": "Invasionskysten", "sub": "Pointe du Hoc, Arromanches, Juno Beach", "over": "Brit Hotel Caen Nord · 125 km / ~7t", "stops": [13, 14, 15], "warn": null}, {"d": 6, "label": "Torsdag", "title": "Østflanken + Mémorial de Caen", "sub": "Pegasus, Merville · Mémorial de Caen eftermiddag", "over": "Brit Hotel Caen Nord · 55 km / ~8t", "stops": [16, 17, 18], "warn": null}, {"d": 7, "label": "Fredag", "title": "Afrejse → Belgien", "sub": "Caen → Bastogne Barracks · afgang ~08:00", "over": "Bastogne · 500 km / ~7,5t inkl. besøg", "stops": [19], "warn": "Lang køredag. Afgang Caen ~08:00 – ankomst Bastogne ~13:00 – besøg 2,5t – overnatning.", "extras": [{"title": "Andre interessante muligheder i Bastogne", "items": [["101st Airborne Museum", "https://101airbornemuseumbastogne.com/en/", "Et mere fokuseret museum om 101st Airborne og kampene i og omkring Bastogne."], ["Bastogne War Museum", "https://www.bastognewarmuseum.be/en/home-en/", "Større og mere moderne formidling af Ardenneroffensiven og Battle of the Bulge."], ["Liberation Route – Around Bastogne", "https://www.liberationroute.com/en/themed-routes/8/around-bastogne", "Temarute med steder og historier rundt om Bastogne."], ["Liberation Route – alle temaruter", "https://www.liberationroute.com/en/themed-routes", "God til at finde ekstra stop, hvis programmet skal justeres."]]}]}, {"d": 8, "label": "Lørdag", "title": "Holland", "sub": "Overloon og Hartenstein/Arnhem", "over": "Arnhem · 240 km / ~6t inkl. besøg", "stops": [20, 21], "warn": null}, {"d": 9, "label": "Søndag", "title": "Munster + Flensborg + hjemkomst", "sub": "Munster → Fleggaard Harrislee → Skive", "over": "Ankomst Skive Kaserne – søndag aften · ca. 580 km / ~7–8t efter museumsbesøg og shoppingpause", "stops": [22, 23], "warn": "Hjemrejsedag med fagligt stop i Munster og praktisk grænsehandel ved Flensborg. Shopping bør tidsstyres, hvis I vil lande rimeligt i Skive."}];
const REGIONS={

L.polyline(routePts,{color:'#888780',weight:2,dashArray:'7,5',opacity:0.6}).addTo(map);
const markers={};
const sm=Object.fromEntries(STOPS.map(s=>[s.n,s]));
function renderLinks(links){
  if(!links || !links.length) return '';
  return '<div class="stop-links">'+links.map(([label,url])=>'<a href="'+url+'" target="_blank" rel="noopener">'+label+'</a>').join('')+'</div>';
}
STOPS.forEach(s=>{
  const c=COLORS[s.day];
  const icon=L.divIcon({
    html:'<div style="background:'+c+';width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;border:2px solid rgba(255,255,255,0.9);">'+s.n+'</div>',
    className:'',iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-16]
  });
  const m=L.marker([s.lat,s.lng],{icon}).addTo(map);
  m.bindPopup('<b>Stop '+s.n+': '+s.name+'</b><br><span style="font-size:11px;">'+s.meta+'</span><br><span style="font-size:11px;">'+s.teaser+'</span>'+renderLinks(s.links));

});
const leg=L.control({position:'bottomleft'});
leg.onAdd=()=>{
  const d=L.DomUtil.create('div');
  d.style.cssText='background:rgba(255,255,255,0.96);padding:10px 12px;border-radius:8px;font-size:12px;line-height:2;font-family:sans-serif;border:1px solid rgba(0,0,0,0.1);';
  const e=[[1,'Lørdag – Flensborg / broer'],[2,'Søndag – La Coupole / Caen'],[3,'Man–tors – Normandiet'],[7,'Fredag – Belgien'],[8,'Lørdag – Holland'],[9,'Søndag – Munster / Flensborg / hjem']];
  d.innerHTML=e.map(([day,lbl])=>'<div><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+COLORS[day]+';vertical-align:middle;margin-right:7px;"></span>'+lbl+'</div>').join('');
  return d;
};
leg.addTo(map);
function zoomRegion(r){map.fitBounds(L.latLngBounds(REGIONS[r]).pad(REGION_PAD[r]));}
zoomRegion('all');
function flyToStop(n){
  const s=sm[n];
  map.setView([s.lat,s.lng],13,{animate:true,duration:0.8});
  setTimeout(()=>markers[n].openPopup(),850);
  document.getElementById('map').scrollIntoView({behavior:'smooth',block:'center'});
}
function extraHtml(day){
  if(!day.extras) return '';
  return day.extras.map(box=>'<div class="extra-box"><div class="extra-title">'+box.title+'</div>'+
    box.items.map(([name,url,txt])=>'<div class="extra-item"><a href="'+url+'" target="_blank" rel="noopener">'+name+'</a> – '+txt+'</div>').join('')+
    '</div>').join('');
}
const colA=document.getElementById('col-a');

        '<div class="stop-name" style="color:'+c+';text-decoration-color:'+c+'55;" onclick="flyToStop('+n+')">'+s.name+'</div>'+
        '<div class="stop-desc">'+s.meta+'</div>'+
        '<div class="stop-teaser">'+s.teaser+'</div>'+
        renderLinks(s.links)+
      '</div></div>';
  }).join('');
  const warnHtml=day.warn?'<div class="warn-box"><i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:4px;"></i>'+day.warn+'</div>':'';
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=
    '<div style="background:'+c+';padding:9px 12px;">'+
      '<div class="card-day">'+day.label+'</div>'+
      '<div class="card-title">'+day.title+'</div>'+
      '<div class="card-sub">'+day.sub+'</div>'+
    '</div>'+
    '<div class="card-body">'+items+'</div>'+
    warnHtml+
    extraHtml(day)+
    '<div class="card-footer"><i class="ti ti-bed"></i><span>'+day.over+'</span></div>';
  col.appendChild(card);
});
</script>
</body>
</html>
