<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWII Studierejse – Rutekort</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; padding: 20px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #5f5e5a; margin-bottom: 16px; }
  .zoom-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .zoom-bar span { font-size: 11px; color: #5f5e5a; }
  .zoom-btn { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; color: #fff; }
  .map-wrap { border-radius: 10px; overflow: hidden; border: 0.5px solid #d4d3ce; margin-bottom: 16px; }
  #map { height: 550px; width: 100%; }
  .hint { font-size: 11px; color: #5f5e5a; margin-bottom: 20px; display: flex; align-items: center; gap: 5px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .card { background: #fff; border-radius: 10px; border: 0.5px solid #d4d3ce; overflow: hidden; }
  .card-day { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.65); }
  .card-title { font-size: 13px; font-weight: 500; color: #fff; margin-top: 1px; }
  .card-sub { font-size: 11px; color: rgba(255,255,255,0.78); }
  .card-body { padding: 10px 12px 2px; }
  .stop-row { display: flex; align-items: flex-start; gap: 8px; padding-bottom: 9px; }
  .stop-num { border-radius: 50%; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; margin-top: 2px; color: #fff; }
  .stop-name { font-size: 12px; font-weight: 500; line-height: 1.3; cursor: pointer; text-underline-offset: 2px; text-decoration: underline; }
  .stop-desc { font-size: 11px; color: #5f5e5a; line-height: 1.35; margin-top: 1px; }
  .warn-box { margin: 0 12px 10px; padding: 7px 10px; border-radius: 6px; background: #faeeda; border-left: 3px solid #ba7517; font-size: 11px; color: #854f0b; line-height: 1.45; }
  .card-footer { padding: 6px 12px 8px; border-top: 0.5px solid #d4d3ce; background: #f9f8f6; display: flex; align-items: flex-start; gap: 6px; }
  .card-footer i { font-size: 13px; color: #5f5e5a; margin-top: 1px; }
  .card-footer span { font-size: 11px; color: #5f5e5a; line-height: 1.4; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } #map { height: 380px; } }
</style>
</head>
<body>
<h1>WWII Studierejse – Rutekort</h1>
<p class="subtitle">Lørdag til søndag ugen efter · 22 stop · 9 dage · Skive → Normandiet → Belgien → Holland → Nordtyskland → Skive</p>
<div class="zoom-bar">
  <span>Zoom til:</span>
  <button class="zoom-btn" style="background:#5F5E5A" onclick="zoomRegion('all')">Hele ruten</button>
  <button class="zoom-btn" style="background:#185FA5" onclick="zoomRegion('normandy')">Normandiet (7–17)</button>
  <button class="zoom-btn" style="background:#0F6E56" onclick="zoomRegion('holland')">Holland (19–20)</button>
  <button class="zoom-btn" style="background:#993C1D" onclick="zoomRegion('germany')">Nordtyskland (21–22)</button>
</div>
<div class="map-wrap"><div id="map"></div></div>
<p class="hint"><i class="ti ti-hand-click" style="font-size:14px;"></i> Klik på et lokationsnavn for at springe til stedet på kortet</p>
<div class="grid">
  <div class="col" id="col-a"></div>
  <div class="col" id="col-b"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const COLORS={1:'#5F5E5A',2:'#534AB7',3:'#185FA5',4:'#185FA5',5:'#185FA5',6:'#185FA5',7:'#BA7517',8:'#0F6E56',9:'#993C1D'};
const STOPS=[
  {n:1, day:1,lat:56.567,lng:9.033,  name:'Skive Kaserne',                      desc:'Afgang morgen'},
  {n:2, day:1,lat:55.491,lng:9.472,  name:'Kolding – opsamling',                desc:'Mødested'},
  {n:3, day:1,lat:51.843,lng:5.862,  name:'Nijmegen-broen (Waalbroen)',          desc:'45 min – den amerikanske bro taget 20. sep. 1944'},
  {n:4, day:1,lat:51.960,lng:5.913,  name:'Arnhem-broen (John Frost Bridge)',    desc:'45 min – a bridge too far · briterne holdt i 4 dage'},
  {n:5, day:1,lat:51.842,lng:5.853,  name:'Nijmegen – overnatning',             desc:'585 km / ~7t inkl. begge broer'},
  {n:6, day:2,lat:50.740,lng:2.260,  name:'La Coupole, Wizernes',               desc:'2,5t – V2-raketbunker · 260 km fra Nijmegen'},
  {n:7, day:2,lat:49.190,lng:-0.383, name:'Brit Hotel Caen Nord – Mémorial',    desc:'Base i Normandiet (søndag–fredag, 5 nætter) · 280 km fra La Coupole'},
  {n:8, day:3,lat:49.408,lng:-1.314, name:'Airborne Museum, St-Mère-Église',    desc:'2,5t – 80 km fra Caen'},
  {n:9, day:3,lat:49.384,lng:-1.240, name:'Easy Co. & Maj. Winters memorial',   desc:'45 min – 10 km'},
  {n:10,day:3,lat:49.302,lng:-1.244, name:'Normandy Victory Museum, Carentan',  desc:'2t – 15 km'},
  {n:11,day:4,lat:49.369,lng:-0.862, name:'Omaha Beach + Colleville kirkegård', desc:'3,5t – 35 km fra Caen'},
  {n:12,day:5,lat:49.397,lng:-0.990, name:'Pointe du Hoc',                      desc:'1,5t – 45 km fra Caen'},
  {n:13,day:5,lat:49.340,lng:-0.622, name:'Musée du Débarquement, Arromanches', desc:'2t – 30 km'},
  {n:14,day:5,lat:49.334,lng:-0.447, name:'Centre Juno Beach, Courseulles',     desc:'2t – 25 km'},
  {n:15,day:6,lat:49.244,lng:-0.274, name:'Mémorial Pegasus',                   desc:'2t – 15 km fra Caen'},
  {n:16,day:6,lat:49.262,lng:-0.188, name:'Merville Battery',                   desc:'1,5t – 10 km'},
  {n:17,day:6,lat:49.196,lng:-0.383, name:'Mémorial de Caen',                   desc:'3t – eftermiddag · sidste dag i Caen'},
  {n:18,day:7,lat:50.001,lng:5.716,  name:'Bastogne Barracks',                  desc:'2,5t – 500 km fra Caen · afgang ~08:00'},
  {n:19,day:8,lat:51.570,lng:5.934,  name:'Overloon War Museum',                desc:'2t – 180 km fra Bastogne'},
  {n:20,day:8,lat:51.984,lng:5.852,  name:'Airborne Museum Hartenstein, Arnhem',desc:'2,5t – 60 km fra Overloon · overnatning Arnhem'},
  {n:21,day:9,lat:52.967,lng:10.090, name:'Deutsches Panzermuseum, Munster',    desc:'2t – 200 km fra Arnhem'},
  {n:22,day:9,lat:54.406,lng:10.219, name:'Laboe Naval Memorial',               desc:'1,5t – 170 km fra Munster · derefter 280 km hjem'},
];
const DAYS=[
  {d:1,label:'Lørdag',  title:'Udrejse + begge broer',         sub:'Skive → Nijmegen-broen → Arnhem-broen → overnatning',  over:'Nijmegen · 585 km / ~7t inkl. broer',                          stops:[1,2,3,4,5],  warn:null},
  {d:2,label:'Søndag',  title:'La Coupole → Caen',             sub:'Nordfrankrig og ankomst Caen',                         over:'Brit Hotel Caen Nord – Mémorial · 540 km / ~7,5t',             stops:[6,7],        warn:null},
  {d:3,label:'Mandag',  title:'Cotentin-halvøen',               sub:'St-Mère-Église, Easy Co., Carentan',                  over:'Brit Hotel Caen Nord · 155 km / ~7t',                          stops:[8,9,10],     warn:null},
  {d:4,label:'Tirsdag', title:'Omaha Beach',                    sub:'Omaha Beach + Colleville amerikanske kirkegård',      over:'Brit Hotel Caen Nord · 70 km / ~5t',                           stops:[11],         warn:null},
  {d:5,label:'Onsdag',  title:'Invasionskysten',                sub:'Pointe du Hoc, Arromanches, Juno Beach',             over:'Brit Hotel Caen Nord · 125 km / ~7t',                          stops:[12,13,14],   warn:null},
  {d:6,label:'Torsdag', title:'Østflanken + Mémorial de Caen',  sub:'Pegasus, Merville · Mémorial de Caen eftermiddag',  over:'Brit Hotel Caen Nord · 55 km / ~8t',                           stops:[15,16,17],   warn:null},
  {d:7,label:'Fredag',  title:'Afrejse → Belgien',              sub:'Caen → Bastogne Barracks · afgang ~08:00',           over:'Bastogne · 500 km / ~7,5t inkl. besøg',                        stops:[18],         warn:'Lang køredag. Afgang Caen ~08:00 – ankomst Bastogne ~13:00 – besøg 2,5t – overnatning.'},
  {d:8,label:'Lørdag',  title:'Holland',                        sub:'Overloon og Hartenstein/Arnhem',                     over:'Arnhem · 240 km / ~6t inkl. besøg',                            stops:[19,20],      warn:null},
  {d:9,label:'Søndag',  title:'Munster + Laboe + hjemkomst',    sub:'Munster → Laboe Naval Memorial → Skive',            over:'Ankomst Skive Kaserne – søndag aften · 650 km / ~9,5t',        stops:[21,22],      warn:'Fuld hjemrejsedag. Munster ~09:00–11:00 → Laboe ~13:00–14:30 → Skive ~17:30.'},
];
const REGIONS={
  all:     STOPS.map(s=>[s.lat,s.lng]),
  normandy:STOPS.filter(s=>s.n>=7&&s.n<=17).map(s=>[s.lat,s.lng]),
  holland: STOPS.filter(s=>s.n>=19&&s.n<=20).map(s=>[s.lat,s.lng]),
  germany: STOPS.filter(s=>s.n>=21&&s.n<=22).map(s=>[s.lat,s.lng]),
};
const REGION_PAD={all:0.07,normandy:0.1,holland:0.2,germany:0.2};
const map=L.map('map',{scrollWheelZoom:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap contributors'}).addTo(map);
const routePts=[
  [56.567,9.033],[55.491,9.472],
  [51.843,5.862],[51.960,5.913],[51.842,5.853],
  [50.740,2.260],[49.190,-0.383],
  [49.408,-1.314],[49.384,-1.240],[49.302,-1.244],[49.190,-0.383],
  [49.369,-0.862],[49.190,-0.383],
  [49.397,-0.990],[49.340,-0.622],[49.334,-0.447],[49.190,-0.383],
  [49.244,-0.274],[49.262,-0.188],[49.196,-0.383],
  [50.001,5.716],[51.570,5.934],[51.984,5.852],
  [52.967,10.090],[54.406,10.219],[56.567,9.033]
];
L.polyline(routePts,{color:'#888780',weight:2,dashArray:'7,5',opacity:0.6}).addTo(map);
const markers={};
const sm=Object.fromEntries(STOPS.map(s=>[s.n,s]));
STOPS.forEach(s=>{
  const c=COLORS[s.day];
  const icon=L.divIcon({
    html:'<div style="background:'+c+';width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;border:2px solid rgba(255,255,255,0.9);">'+s.n+'</div>',
    className:'',iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-16]
  });
  const m=L.marker([s.lat,s.lng],{icon}).addTo(map);
  m.bindPopup('<b>Stop '+s.n+': '+s.name+'</b><br><span style="font-size:11px;">'+s.desc+'</span>');
  markers[s.n]=m;
});
const leg=L.control({position:'bottomleft'});
leg.onAdd=()=>{
  const d=L.DomUtil.create('div');
  d.style.cssText='background:rgba(255,255,255,0.96);padding:10px 12px;border-radius:8px;font-size:12px;line-height:2;font-family:sans-serif;border:1px solid rgba(0,0,0,0.1);';
  const e=[[1,'Lørdag – udrejse / broer'],[2,'Søndag – La Coupole / Caen'],[3,'Man–tors – Normandiet'],[7,'Fredag – Belgien'],[8,'Lørdag – Holland'],[9,'Søndag – Munster / Laboe / hjem']];
  d.innerHTML=e.map(([day,lbl])=>'<div><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+COLORS[day]+';vertical-align:middle;margin-right:7px;"></span>'+lbl+'</div>').join('');
  return d;
};
leg.addTo(map);
function zoomRegion(r){map.fitBounds(L.latLngBounds(REGIONS[r]).pad(REGION_PAD[r]));}
zoomRegion('all');
function flyToStop(n){
  const s=sm[n];
  map.setView([s.lat,s.lng],13,{animate:true,duration:0.8});
  setTimeout(()=>markers[n].openPopup(),850);
  document.getElementById('map').scrollIntoView({behavior:'smooth',block:'center'});
}
const colA=document.getElementById('col-a');
const colB=document.getElementById('col-b');
DAYS.forEach((day,i)=>{
  const col=i<5?colA:colB;
  const c=COLORS[day.d];
  const items=day.stops.map(n=>{
    const s=sm[n];
    return '<div class="stop-row">'+
      '<span class="stop-num" style="background:'+c+';">'+n+'</span>'+
      '<div>'+
        '<div class="stop-name" style="color:'+c+';text-decoration-color:'+c+'55;" onclick="flyToStop('+n+')">'+s.name+'</div>'+
        '<div class="stop-desc">'+s.desc+'</div>'+
      '</div></div>';
  }).join('');
  const warnHtml=day.warn?'<div class="warn-box"><i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:4px;"></i>'+day.warn+'</div>':'';
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=
    '<div style="background:'+c+';padding:9px 12px;">'+
      '<div class="card-day">'+day.label+'</div>'+
      '<div class="card-title">'+day.title+'</div>'+
      '<div class="card-sub">'+day.sub+'</div>'+
    '</div>'+
    '<div class="card-body">'+items+'</div>'+
    warnHtml+
    '<div class="card-footer"><i class="ti ti-bed"></i><span>'+day.over+'</span></div>';
  col.appendChild(card);
});
</script>
</body>
</html>
