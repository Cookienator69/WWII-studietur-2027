  [51.987675,5.832904],
  [52.987093,10.109576],
  [54.795169,9.380105],
  [55.724279,9.571150],
  [56.541511,9.036143]
];
L.polyline(routePts,{color:'#888780',weight:2,dashArray:'7,5',opacity:0.6}).addTo(map);
const markers={};
const sm=Object.fromEntries(STOPS.map(s=>[s.n,s]));

function renderLinks(links){
  if(!links || !links.length) return '';
  return '<div class="stop-links">'+links.map(([label,url])=>'<a href="'+url+'" target="_blank" rel="noopener">'+label+'</a>').join('')+'</div>';
}

STOPS.forEach(s=>{
  const c=COLORS[s.day];
  const icon=L.divIcon({
    html:'<div style="background:'+c+';width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;border:2px solid rgba(255,255,255,0.9);">'+s.n+'</div>',
    className:'',iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-16]
  });
  const m=L.marker([s.lat,s.lng],{icon}).addTo(map);
  m.bindPopup('<b>Stop '+s.n+': '+s.name+'</b><br><span style="font-size:11px;">'+s.meta+'</span><br><span style="font-size:11px;">'+s.teaser+'</span>'+renderLinks(s.links));
  markers[s.n]=m;
});

const leg=L.control({position:'bottomleft'});
leg.onAdd=()=>{
  const d=L.DomUtil.create('div');
  d.style.cssText='background:rgba(255,255,255,0.96);padding:10px 12px;border-radius:8px;font-size:12px;line-height:2;font-family:sans-serif;border:1px solid rgba(0,0,0,0.1);';
  const e=[[1,'Lørdag – Flensborg / broer'],[2,'Søndag – La Coupole / Caen'],[3,'Man–tors – Normandiet'],[7,'Fredag – Belgien'],[8,'Lørdag – Holland'],[9,'Søndag – Munster / Flensborg / Vejle / Skive']];
  d.innerHTML=e.map(([day,lbl])=>'<div><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+COLORS[day]+';vertical-align:middle;margin-right:7px;"></span>'+lbl+'</div>').join('');
  return d;
};
leg.addTo(map);

function zoomRegion(r){map.fitBounds(L.latLngBounds(REGIONS[r]).pad(REGION_PAD[r]));}
zoomRegion('all');

function flyToStop(n){
  const s=sm[n];
  map.setView([s.lat,s.lng],13,{animate:true,duration:0.8});
  setTimeout(()=>markers[n].openPopup(),850);
  document.getElementById('map').scrollIntoView({behavior:'smooth',block:'center'});
}

function extraHtml(day){
  if(!day.extras) return '';
  return day.extras.map(box=>'<div class="extra-box"><div class="extra-title">'+box.title+'</div>'+
    box.items.map(([name,url,txt])=>'<div class="extra-item"><a href="'+url+'" target="_blank" rel="noopener">'+name+'</a> – '+txt+'</div>').join('')+
    '</div>').join('');
}

const colA=document.getElementById('col-a');
const colB=document.getElementById('col-b');
DAYS.forEach((day,i)=>{
  const col=i<5?colA:colB;
  const c=COLORS[day.d];
  const items=day.stops.map(n=>{
    const s=sm[n];
    return '<div class="stop-row">'+
      '<span class="stop-num" style="background:'+c+';">'+n+'</span>'+
      '<div>'+
        '<div class="stop-name" style="color:'+c+';text-decoration-color:'+c+'55;" onclick="flyToStop('+n+')">'+s.name+'</div>'+
        '<div class="stop-desc">'+s.meta+'</div>'+
        '<div class="stop-teaser">'+s.teaser+'</div>'+
        renderLinks(s.links)+
      '</div></div>';
  }).join('');
  const warnHtml=day.warn?'<div class="warn-box"><i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:4px;"></i>'+day.warn+'</div>':'';
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=
    '<div style="background:'+c+';padding:9px 12px;">'+
      '<div class="card-day">'+day.label+'</div>'+
      '<div class="card-title">'+day.title+'</div>'+
      '<div class="card-sub">'+day.sub+'</div>'+
    '</div>'+
    '<div class="card-body">'+items+'</div>'+
    warnHtml+
    extraHtml(day)+
    '<div class="card-footer"><i class="ti ti-bed"></i><span>'+day.over+'</span></div>';
  col.appendChild(card);
});
</script>
</body>
</html>
